version: '3.8'

services:
  app:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      - PORT=8080
      - DB_HOST=premierprime-db.c1g8gckm03ld.us-east-2.rds.amazonaws.com
      - DB_PORT=5432
      - DB_USER=postgres
      - DB_PASSWORD=PremierPrime2024!Secure
      - DB_NAME=cleaning_app
      - JWT_SECRET=cNGyMSKIu0k0xNYe+5GGVy/7+EgRVNPAgCr2v5KjNzE=
      - JWT_EXPIRY=24h
      - DATABASE_URL=postgres://postgres:PremierPrime2024!Secure@/cleaning_app?sslmode=require
    restart: unless-stopped
    volumes:
      - ./logs:/root/logs
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8080/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - REACT_APP_API_URL=https://premierprime.org/api
    ports:
      - "3000:80"
    depends_on:
      - app
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:80"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  logs:
